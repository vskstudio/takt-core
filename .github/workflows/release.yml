name: Release
# Publishes to npm when a GitHub Release is published. Authenticates with a
# granular access token (NPM_TOKEN secret) that has "bypass 2FA" enabled, so
# no interactive 2FA is needed on the runner. The org restricts the Actions
# token to read-only, so we avoid any git writes from the runner.
on:
  release:
    types: [published]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
